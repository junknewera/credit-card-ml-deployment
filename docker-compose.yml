services:
  ml-service:
    build: .
    container_name: credit-default-service
    ports:
      - "5000:5000"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: credit-default-nginx
    depends_on:
      - ml-service
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

